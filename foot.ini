title=foot
font=JetBrains Mono NF:size=11.5
font-bold=JetBrains Mono NF:size=11.5:weight=bold
font-italic=JetBrains Mono NF:size=11.5:slant=italic
font-bold-italic=JetBrains Mono NF:size=11.5:weight=bold:slant=italic
letter-spacing=0
dpi-aware=no
bold-text-in-bright=no
gamma-correct-blending=no
pad=8x8
include=~/.config/foot/theme.ini

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5
blink=yes

[colors-dark]
alpha=0.85

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
